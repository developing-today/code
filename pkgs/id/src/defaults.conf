# Build-time defaults for id peer discovery.
#
# This file is embedded into the binary at compile time via include_str!().
# Values here supplement CLI flags -- they are used unless the user passes
# --no-default-bootstrap or --no-default-topic.
#
# Format:
#   [section]      — starts a section
#   # comment      — ignored
#   value          — one value per line (blank lines ignored)
#
# To replace all defaults at build time, edit this file before compiling.
# To add peers at runtime, use --bootstrap on the CLI.
# To skip these defaults entirely, use --no-default-bootstrap.

[bootstrap]
# Core servers expected to always be running.
# Add node IDs (64-char hex or base32) one per line.
# Example:
# aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

[topic]
# Default gossip topic name. Only the first non-comment line is used.
id-peer-discovery-v1

[topic_secret]
# Default shared secret for the public discovery network.
# Only the first non-comment line is used.
id-public-discovery-v1
