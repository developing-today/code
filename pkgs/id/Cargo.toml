[package]
name = "id"
version = "0.1.0"
edition = "2024"
rust-version = "1.89.0"
description = "A peer-to-peer file sharing CLI built with Iroh"
license = "MIT OR Apache-2.0"
repository = "https://github.com/example/id"
keywords = ["p2p", "file-sharing", "iroh", "cli"]
categories = ["command-line-utilities", "network-programming"]

# =============================================================================
# Features
# =============================================================================

[features]
default = []
web = [
  "dep:axum",
  "dep:tower",
  "dep:tower-http",
  "dep:rust-embed",
  "dep:mime_guess",
  "dep:futures",
  "dep:rmp-serde",
  "dep:comrak",
  "dep:urlencoding",
  "dep:libsql",
  "dep:hkdf",
  "dep:sha2",
]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"
distributed-topic-tracker = { git = "https://github.com/developing-today-forks/distributed-topic-tracker", branch = "main" }
ed25519-dalek = { version = "3.0.0-pre.1", features = ["rand_core"] }
futures-lite = "2"
iroh = { version = "0.97", features = ["address-lookup-mdns"] }
iroh-base = "0.97"
iroh-blobs = "0.99"
iroh-docs = "0.97"
iroh-gossip = { version = "0.97", features = ["net"] }
postcard = { version = "1", features = ["alloc"] }
rand = "0.9"
rustyline = "15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Web feature dependencies (optional)
axum = { version = "0.7", features = ["ws", "multipart"], optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = [
  "fs",
  "cors",
  "compression-gzip",
], optional = true }
rust-embed = { version = "8", optional = true }
mime_guess = { version = "2", optional = true }
futures = { version = "0.3.32", optional = true }
rmp-serde = { version = "1", optional = true }
comrak = { version = "0.51", default-features = false, optional = true }
urlencoding = { version = "2", optional = true }
libsql = { version = "0.6", features = ["encryption"], optional = true }
hkdf = { version = "0.12", optional = true }
sha2 = { version = "0.10", optional = true }

[dev-dependencies]
tempfile = "3"

# =============================================================================
# Lints Configuration
# =============================================================================
# Comprehensive linting using Cargo's built-in lints table (Rust 1.74+).
# This provides consistent linting across `cargo build`, `cargo clippy`, etc.

[lints.rust]
# Rust compiler lints
unsafe_code = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }
rust_2024_compatibility = { level = "warn", priority = -1 }
missing_debug_implementations = "warn"
missing_docs = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_lifetimes = "warn"
unused_qualifications = "warn"
# Treat some warnings as errors in CI
# dead_code = "deny"
# unused_imports = "deny"

[lints.clippy]
# Enable standard lint groups
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }

# Deny critical issues - these indicate bugs or serious problems
# Test modules should add: #[allow(clippy::unwrap_used, clippy::expect_used)]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unimplemented = "deny"
todo = "deny"
dbg_macro = "deny"
# Allow print macros - this is a CLI application
print_stdout = "allow"
print_stderr = "allow"

# Restriction lints - selectively enable valuable checks
clone_on_ref_ptr = "warn"
create_dir = "warn"
deref_by_slicing = "warn"
empty_structs_with_brackets = "warn"
filetype_is_file = "warn"
float_cmp_const = "warn"
fn_to_numeric_cast_any = "warn"
format_push_string = "warn"
get_unwrap = "warn"
if_then_some_else_none = "warn"
lossy_float_literal = "warn"
map_err_ignore = "warn"
mem_forget = "warn"
mixed_read_write_in_expression = "warn"
mutex_atomic = "warn"
rc_buffer = "warn"
rc_mutex = "warn"
redundant_type_annotations = "warn"
rest_pat_in_fully_bound_structs = "warn"
same_name_method = "warn"
self_named_module_files = "warn"
str_to_string = "warn"
string_add = "warn"
# string_to_string removed - clippy::implicit_clone covers it
suspicious_xor_used_as_pow = "warn"
try_err = "warn"
undocumented_unsafe_blocks = "warn"
unnecessary_safety_comment = "warn"
unnecessary_safety_doc = "warn"
unnecessary_self_imports = "warn"
unneeded_field_pattern = "warn"
verbose_file_reads = "warn"

# Allow specific lints - too noisy or conflict with project style
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
redundant_pub_crate = "allow"
significant_drop_tightening = "allow"
option_if_let_else = "allow"
multiple_crate_versions = "allow"
cargo_common_metadata = "allow"
too_many_lines = "allow"
# Allow these - they're reasonable for CLI app complexity
too_many_arguments = "allow"
fn_params_excessive_bools = "allow"
struct_excessive_bools = "allow"
cognitive_complexity = "allow"
future_not_send = "allow"

# =============================================================================
# Profile Configuration
# =============================================================================

[profile.dev]
# Faster debug builds with some optimization
opt-level = 0
debug = true
incremental = true

[profile.release]
# Optimize for size and speed
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

[profile.test]
# Include debug info for better error messages
debug = true
opt-level = 0
