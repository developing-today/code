[formatter]

# Exclude pkgs/id/ — it has its own treefmt/formatter
[global]
excludes = [
  "pkgs/id/**",    # has its own treefmt/formatter
  "pkgs/dht/**",   # WIP package with syntax errors
  ".opencode/**",  # managed by opencode, may have permission issues
]

# [formatter.<name>]
# command = "<formatter-command>"
# options = [“<formatter-option-1>”...]
#[formatter.alejandra]
#command = "alejandra"
#includes = ["*.nix"]
[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.statix]
command = "bash"
options = ["-c", "for f in \"$@\"; do statix fix -- \"$f\"; done", "_"]
includes = ["*.nix"]

#[formatter.deadnix]
# Kept as manual tool only — auto-edit risks removing intentional unused bindings
# Run `deadnix` to check, `deadnix --edit` to fix
#command = "deadnix"
#options = ["--edit"]
#includes = ["*.nix"]

# todo make options etc
#[formatter.flake-checker]
#command = "nix run github:DeterminateSystems/flake-checker"
#includes = ["flake.lock"]

[formatter.biome]
command = "biome"
includes = [
  "*.js",
  "*.jsx",
  "*.ts",
  "*.tsx",
  "*.css",
  "*.json",
  "*.graphql",
]
options = ["format", "--write", "--config-path", "."]

[formatter.prettier]
command = "prettier"
includes = [
  "*.html",
  "*.md",
  "*.mdx",
  "*.scss",
  "*.yaml",
]
options = ["--write"]

[formatter.shfmt]
command = "shfmt"
includes = ["*.sh"]
options = ["-i", "2", "-s", "-w"]

[formatter.rustfmt]
command = "rustfmt"
options = ["--edition", "2024"]
includes = ["*.rs"]

[formatter.shellcheck]
command = "shellcheck"
includes = ["*.sh"]

[formatter.ruby]
command = "rufo"
options = ["-x"]
includes = ["*.rb"]

[formatter.python]
command = "ruff"
options = ["format"]
includes = ["*.py"]

[formatter.elm]
command = "elm-format"
options = ["--yes"]
includes = ["*.elm"]

[formatter.go]
command = "gofmt"
options = ["-w"]
includes = ["*.go"]

[formatter.haskell]
command = "ormolu"
options = [
  "--ghc-opt",
  "-XBangPatterns",
  "--ghc-opt",
  "-XPatternSynonyms",
  "--ghc-opt",
  "-XTypeApplications",
  "--mode",
  "inplace",
  "--check-idempotence",
]
includes = ["*.hs"]
excludes = ["examples/haskell/"]
#[formatter.terraform]
# Careful, only terraform 1.3.0 or later accept a list of files.
# see https://github.com/numtide/treefmt/issues/97
#command = "terraform"
#options = ["fmt"]
#includes = ["*.tf"]

